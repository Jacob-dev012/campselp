<!DOCTYPE html>
<html>
<head>
  <title>Campselp Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Login</h2>

  <form id="loginForm">

    <input 
      type="email" 
      name="email" 
      placeholder="Email" 
      required
    >

    <input 
      type="password" 
      name="password" 
      placeholder="Password" 
      required
    >

    <button type="submit">Login</button>

  </form>

  <p>Don't have an account? <a href="signup.html">Sign up</a></p>

  <script src="script.js"></script>
</body>
</html>
